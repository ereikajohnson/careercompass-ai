{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4 mt-5 glass-effect">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3"
                        style="width: 80px; height: 80px;">
                        <i class="bi bi-person-lock fs-1"></i>
                    </div>
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted">Enter your credentials to access your dashboard</p>
                </div>

                <form method="POST" action="" autocomplete="off">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0"><i
                                    class="bi bi-person"></i></span>
                            <input type="text" class="form-control form-control-lg border-start-0" id="username"
                                name="username" placeholder="Enter username" required autofocus value=""
                                autocomplete="off">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control form-control-lg border-start-0 border-end-0"
                                id="password" name="password" placeholder="••••••••" required value=""
                                autocomplete="new-password">
                            <span class="input-group-text bg-transparent border-start-0 cursor-pointer"
                                id="togglePassword" style="cursor: pointer;">
                                <i class="bi bi-eye-slash" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3 shadow-sm py-3">
                            <i class="bi bi-door-open-fill me-2"></i>Sign In
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-transparent text-center py-4 border-top">
                <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}"
                        class="text-primary fw-bold text-decoration-none">Create Account</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const toggleIcon = document.querySelector('#toggleIcon');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        toggleIcon.classList.toggle('bi-eye');
        toggleIcon.classList.toggle('bi-eye-slash');
    });
</script>
{% endblock %}
